          "./img/home-treatment-2.jpg",
          "./img/home-treatment-3.jfif",
          "./img/home-treatment-4.jpg"
        ]
      }
    ];
    
    // ===== DOM References =====
    const menu = document.getElementById('servicesMenu');
    const display = document.getElementById('serviceDisplay');
    const section = document.getElementById('servicesSection');
    
    let currentServiceId = 1;
    let currentImageIndex = 0;
    let imageInterval = null;
    
    // ===== أيقونات المميزات =====
    const featureIcons = {
      "تدليك علاجي": '<circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/>',
      "تحريك مفاصل": '<path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>',
      "تخفيف الألم": '<circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>',
      "تحسين المرونة": '<path d="M4 17L20 7"/><path d="M4 7L20 17"/>',
      "علاج الشد العضلي": '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/>',
      "تحفيز نقاط التوتر": '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>',
      "تقوية عضلية": '<path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>',
      "تمارين إطالة": '<path d="M4 4L20 20"/><path d="M20 4L4 20"/>',
      "استعادة الحركة": '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/>',
      "متابعة دقيقة": '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
      "تحسين الدورة اللمفاوية": '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M8 10l2 2 4-4"/>',
      "تقليل التورم": '<circle cx="12" cy="12" r="10"/><path d="M8 8L16 16"/><path d="M16 8L8 16"/>',
      "إزالة السموم": '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="8" y1="11" x2="16" y2="11"/>',
      "تحفيز الشفاء": '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
      "تعافي من الإصابات": '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/>',
      "العودة للنشاط": '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
      "برامج مخصصة": '<path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>',
      "راحة المنزل": '<path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>',
      "رعاية متخصصة": '<circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>',
      "أحدث الأجهزة": '<rect x="2" y="4" width="20" height="16" rx="2"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="12" y1="8" x2="12" y2="16"/>',
      "تحسين تدفق الدم": '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 10"/>',
      "الألم المزمن": '<circle cx="12" cy="12" r="10"/><path d="M8 8L16 16"/><path d="M16 8L8 16"/>'
    };
    
    function getFeatureIcon(name) {
      return featureIcons[name] || '<circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>';
    }
    
    // ===== بناء القائمة =====
    function buildMenu() {
      menu.innerHTML = '';
      
      services.forEach((service) => {
        const item = document.createElement('div');
        item.className = `service-list-item ${service.id === currentServiceId ? 'active' : ''}`;
        item.dataset.id = service.id;
        item.setAttribute('role', 'button');
        item.setAttribute('tabindex', '0');
        item.setAttribute('aria-label', `عرض خدمة ${service.title}`);
        
        item.innerHTML = `
          <span class="list-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              ${service.icon}
            </svg>
          </span>
          <span class="list-info">
            <span class="list-title">${service.title}</span>
            <span class="list-sub">${service.features[0]}</span>
          </span>
          <span class="list-number">${service.number}</span>
          <span class="active-indicator"></span>
        `;
        
        item.addEventListener('click', () => selectService(service.id));
        item.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            selectService(service.id);
          }
        });
        
        menu.appendChild(item);
      });
    }
    
    // ===== بناء كرت الخدمة =====
    function buildServiceCard(service) {
      const card = document.createElement('div');
      card.className = 'service-detail-card visible';
      card.id = 'serviceCard';
      
      // الصور المصغرة
      let galleryHtml = '';
      service.images.forEach((img, idx) => {
        galleryHtml += `
          <div class="gallery-thumb ${idx === currentImageIndex ? 'active' : ''}" data-index="${idx}">
            <img src="${img}" alt="${service.title} - صورة ${idx + 1}" loading="lazy" decoding="async">
            <div class="thumb-overlay"></div>
          </div>
        `;
      });
      
      // المميزات
      let featuresHtml = '';
      service.features.forEach(feature => {
        featuresHtml += `
          <div class="feature-item">
            <span class="feature-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                ${getFeatureIcon(feature)}
              </svg>
            </span>
            <span class="feature-text">${feature}</span>
          </div>
        `;
      });
      
      card.innerHTML = `
        <div class="main-image-wrapper">
          <img src="${service.images[currentImageIndex]}" alt="${service.title}" id="mainServiceImage">
          <div class="image-overlay-grad"></div>
          <span class="service-badge">${service.number}</span>
          <span class="image-counter">${currentImageIndex + 1} / ${service.images.length}</span>
        </div>
        <div class="detail-header">
          <span class="detail-number">خدمة ${service.number}</span>
          <h3 class="detail-title">${service.title}</h3>
        </div>
        <div class="detail-body">
          <p class="detail-desc">${service.description}</p>
          <div class="features-grid">${featuresHtml}</div>
          <div class="image-gallery" id="imageGallery">
            ${galleryHtml}
          </div>
          <button class="detail-cta">
            <span>احجز الخدمة الآن</span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>
      `;
      
      // إضافة أحداث للصور المصغرة
      setTimeout(() => {
        const thumbs = card.querySelectorAll('.gallery-thumb');
        thumbs.forEach((thumb) => {
          thumb.addEventListener('click', function() {
            const index = parseInt(this.dataset.index);
            changeImage(index);
          });
        });
      }, 100);
      
      return card;
    }
    
    // ===== تغيير الصورة =====
    function changeImage(index) {
      const card = document.getElementById('serviceCard');
      if (!card) return;
      
      const mainImg = card.querySelector('#mainServiceImage');
      const thumbs = card.querySelectorAll('.gallery-thumb');
      const counter = card.querySelector('.image-counter');
      const service = services.find(s => s.id === currentServiceId);
      
      if (!service || !mainImg) return;
      
      currentImageIndex = index;
      mainImg.style.opacity = '0';
      setTimeout(() => {
        mainImg.src = service.images[index];
        mainImg.style.opacity = '1';
      }, 80);
      
      thumbs.forEach((thumb, i) => {
        thumb.classList.toggle('active', i === index);
      });
      
      if (counter) {
        counter.textContent = `${index + 1} / ${service.images.length}`;
      }
      
      resetImageTimer();
    }
    
    // ===== التبديل التلقائي للصور =====
    function startImageTimer() {
      if (imageInterval) clearInterval(imageInterval);
      imageInterval = setInterval(() => {
        const service = services.find(s => s.id === currentServiceId);
        if (!service) return;
        const nextIndex = (currentImageIndex + 1) % service.images.length;
        changeImage(nextIndex);
      }, 5000);
    }
    
    function resetImageTimer() {
      if (imageInterval) {
        clearInterval(imageInterval);
        imageInterval = null;
      }
      startImageTimer();
    }
    
    // ===== اختيار خدمة =====
    function selectService(serviceId) {
      if (serviceId === currentServiceId) return;
      
      currentServiceId = serviceId;
      currentImageIndex = 0;
      
      // تحديث القائمة
      const items = menu.querySelectorAll('.service-list-item');
      items.forEach(item => {
        item.classList.toggle('active', parseInt(item.dataset.id) === serviceId);
      });
      
      // تحديث الكرت
      const service = services.find(s => s.id === serviceId);
      if (!service) return;
      
      const newCard = buildServiceCard(service);
      display.innerHTML = '';
      display.appendChild(newCard);
      
      resetImageTimer();
    }
    
    // ===== Scroll Reveal =====
    function initScrollReveal() {
      if ('IntersectionObserver' in window && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const card = document.getElementById('serviceCard');
              if (card) card.classList.add('visible');
              observer.unobserve(entry.target);
            }
          });
        }, {
          threshold: 0.1,
          rootMargin: '0px 0px -50px 0px'
        });
        
        observer.observe(section);
      }
    }
    
    // ===== التهيئة =====
    function init() {
      buildMenu();
      
      const firstService = services[0];
      const card = buildServiceCard(firstService);
      display.appendChild(card);
      
      setTimeout(startImageTimer, 500);
      initScrollReveal();
    }
    
    // ===== بدء التشغيل =====
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
    
    window.addEventListener('beforeunload', function() {
      if (imageInterval) clearInterval(imageInterval);
    });
    
  })();
</script>
